# ============================================================
# 光谱农药残留检测 - 多任务深度学习全局配置
# ============================================================
# 统一管理数据、模型、训练、部署四大类超参，杜绝硬编码

# 全局设置
seed: 42
device: auto  # auto / cpu / cuda / cuda:0

# ============================================================
# 数据工程配置
# ============================================================
data:
  num_wavelengths: 256
  wavelength_range: [200, 1000]
  num_classes: 11
  concentration_range: [0.01, 2.0]
  split_ratio: [0.7, 0.2, 0.1]  # train / val / test
  batch_size: 64
  num_workers: 0  # Windows下建议设为0

  # 模拟数据生成
  simulation:
    enabled: true
    samples_per_class: 500
    noise_std: 30.0
    baseline_amplitude: 200.0
    peak_intensity_scale: 1000.0
    concentration_distribution: log_uniform  # uniform / log_uniform

  # 预处理流水线
  preprocessing:
    sg_window: 11
    sg_polyorder: 2
    derivative_order: 1  # 0=不做导数, 1=一阶, 2=二阶
    scatter_correction: snv  # snv / msc / none
    standardize: true  # Z-score标准化

  # 数据增强(仅训练集)
  augmentation:
    enabled: true
    gaussian_noise_std: 0.02
    baseline_shift_range: [-0.05, 0.05]
    band_dropout_prob: 0.1
    band_dropout_width: 5

# ============================================================
# 模型架构配置
# ============================================================
model:
  type: standard  # standard / lightweight

  backbone:
    conv_channels: [32, 64, 128]
    kernel_sizes: [3, 5, 7]  # 多尺度卷积核
    use_batchnorm: true
    dropout: 0.3
    pool_size: 2

  bilstm:
    hidden_dim: 64
    num_layers: 1
    bidirectional: true
    dropout: 0.2

  attention:
    use_channel: true
    use_temporal: true
    channel_reduction: 4
    temporal_heads: 4

  classification_head:
    hidden_dims: [128, 64]
    dropout: 0.4
    num_classes: 11

  regression_head:
    hidden_dims: [128, 64]
    dropout: 0.3
    output_dim: 1

# ============================================================
# 损失函数配置
# ============================================================
loss:
  classification: cross_entropy
  regression: mse
  weighting: uncertainty  # fixed / uncertainty
  fixed_weights:
    classification: 1.0
    regression: 1.0

# ============================================================
# 训练与优化配置
# ============================================================
training:
  epochs: 200
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  mixed_precision: false  # CPU不支持AMP，GPU时可设为true
  grad_clip_norm: 5.0

  scheduler:
    warmup_epochs: 10
    warmup_start_lr: 0.0001
    min_lr: 0.00001
    type: cosine  # cosine / step

  early_stopping:
    patience: 20
    min_delta: 0.001
    monitor: val_loss
    mode: min  # min / max

# ============================================================
# 评估指标配置
# ============================================================
evaluation:
  classification_metrics:
    - accuracy
    - f1_macro
    - f1_weighted
    - confusion_matrix
    - top_k
  regression_metrics:
    - rmse
    - mape
    - r2
    - max_absolute_error
  top_k_values: [3, 5]

# ============================================================
# 部署配置
# ============================================================
deployment:
  onnx:
    opset_version: 13
    dynamic_axes: false
    input_name: spectral_input
    output_names:
      - class_logits
      - concentration
  target_model_size_mb: 10.0
  target_inference_ms: 1000.0

# ============================================================
# 农药类别定义
# ============================================================
pesticide_classes:
  - name: none
    label_zh: 无农药
    mrl: 0.0
  - name: chlorpyrifos
    label_zh: 毒死蜱
    mrl: 0.1
  - name: dimethoate
    label_zh: 乐果
    mrl: 1.0
  - name: omethoate
    label_zh: 氧化乐果
    mrl: 0.02
  - name: phoxim
    label_zh: 辛硫磷
    mrl: 0.05
  - name: malathion
    label_zh: 马拉硫磷
    mrl: 0.5
  - name: carbofuran
    label_zh: 克百威
    mrl: 0.02
  - name: carbendazim
    label_zh: 多菌灵
    mrl: 0.5
  - name: imidacloprid
    label_zh: 吡虫啉
    mrl: 0.5
  - name: acetamiprid
    label_zh: 啶虫脒
    mrl: 0.3
  - name: cypermethrin
    label_zh: 氯氰菊酯
    mrl: 0.5

# ============================================================
# 路径配置
# ============================================================
paths:
  checkpoint_dir: checkpoints
  output_dir: outputs
  log_dir: logs
