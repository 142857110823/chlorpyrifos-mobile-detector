name: pesticide_detector
description: Pesticide residue detection app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # 网络请求
  dio: ^5.5.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # 图表
  fl_chart: ^0.68.0

  # 蓝牙
  flutter_blue_plus: ^1.32.0

  # 权限
  permission_handler: ^11.3.1

  # 图片处理
  image_picker: ^1.1.2
  image: ^4.2.0
  # OpenCV - 使用image包替代
  # flutter_opencv: ^4.8.0  # 暂时禁用，使用image包处理图像

  # 文件操作
  file_picker: ^8.0.6
  share_plus: ^10.0.0

  # PDF生成 - Web平台暂时禁用
  pdf: ^3.11.0
  printing: ^5.13.1

  # 国际化
  intl: ^0.20.2

  # 图标
  flutter_svg: ^2.0.10

  # 工具
  uuid: ^4.4.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  json_annotation: ^4.9.0
  package_info_plus: ^8.0.0

  # ML (仅支持原生平台)
  tflite_flutter: ^0.11.0

  # 数值计算
  collection: ^1.18.0

  # 日期时间
  clock: ^1.1.1

  # OCR
  google_ml_kit: ^0.17.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
    - assets/sample_data/
